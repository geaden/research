name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.14.3
        uses: actions/setup-python@v6
        with:
          python-version: 3.13.2
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/testing.txt
      - name: Test Common
        run: pytest --pyargs common
      - name: Test Stopping Rules Frank-Wolfe Relative Inexact
        run: pytest --pyargs stopping_rules_relative_inexact_fw
      - name: Test Stopping Rules Frank-Wolfe Generalized Convexity
        run: pytest --pyargs stopping_rules_fw_generalized_convexity
      - name: Test Stopping Rules Adaptive Robust Frank-Wolfe
        run: pytest --pyargs stopping_rules_robust_fw
      - name: Test Stopping Rules Absolute Inexact Frank-Wolfe
        run: pytest --pyargs stopping_rules_abs_inexact_fw
